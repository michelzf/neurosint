# Varredura de segredos e PII — segunda linha de defesa (a primeira é o pre-commit local,
# que pode ser pulado com --no-verify). Roda em todo push e pull request.
#   - gitleaks: usa o .gitleaks.toml do repo (segredos: chaves, tokens, JWTs…).
#   - tools/check-pii.sh: padrões óbvios de PII (CPF, telefone BR, JID de WhatsApp).
name: secret-scan

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (histórico completo p/ varrer todos os commits)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Roda o binário do gitleaks diretamente (em vez do gitleaks-action), que NÃO exige
      # GITLEAKS_LICENSE — assim a varredura funciona igual em contas pessoais e em organizações
      # (a action v2 falha em repos de org sem licença). Versão fixada p/ builds reprodutíveis.
      - name: gitleaks (varredura de segredos — histórico completo)
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --verbose

      - name: anti-PII (CPF / telefone / WhatsApp JID)
        run: bash tools/check-pii.sh
